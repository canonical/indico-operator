"""Indico runtime configuration rendered from environment variables.

Loaded by Indico when `INDICO_CONFIG` points at this file. All values are
sourced from environment variables injected by `paas-charm`:

* relation data: `POSTGRESQL_DB_*`, `REDIS_DB_*`, `S3_*`, `SMTP_*`
* charm config:  `FLASK_*` (built-in extension envs plus user config)

This file is part of the rock and is not meant to be edited at deploy time.
Add new config knobs by exposing a charm config option and reading it here.
"""

import os

# --- Database (postgresql relation, required) -------------------------------
SQLALCHEMY_DATABASE_URI = os.environ["POSTGRESQL_DB_CONNECT_STRING"]

# --- Redis (redis relation, required) --------------------------------------
# Used for both cache and Celery broker/result backend.
_REDIS_URL = os.environ["REDIS_DB_CONNECT_STRING"]
REDIS_CACHE_URL = _REDIS_URL
CELERY_BROKER = _REDIS_URL
CELERY_RESULT_BACKEND = _REDIS_URL

# --- Flask secret key (charm config: secret-key) ---------------------------
# `paas-charm` exposes secret-type config as a hex-encoded env var.
_SECRET_KEY_RAW = os.environ.get("FLASK_SECRET_KEY", "")
try:
    SECRET_KEY = bytes.fromhex(_SECRET_KEY_RAW)
except ValueError:
    SECRET_KEY = _SECRET_KEY_RAW.encode("utf-8")

# --- Public URL ------------------------------------------------------------
# Modern (preferred): paas-charm injects FLASK_BASE_URL from the `ingress`
# relation (the external ingress URL when related, otherwise the in-cluster
# k8s service URL). This is the source of truth for Indico's BASE_URL.
#
# `site_url` (FLASK_SITE_URL) is kept ONLY as an explicit manual override for
# seamless upgrades from the legacy indico-operator charm and for deployments
# without an ingress relation. Leave it empty to let the ingress drive the URL.
_SITE_URL = os.environ.get("FLASK_SITE_URL", "")
_INGRESS_URL = os.environ.get("FLASK_BASE_URL", "")
BASE_URL = _SITE_URL or _INGRESS_URL or "http://localhost"

# Trust reverse-proxy headers (X-Forwarded-Proto/Host/Port) so that requests
# arriving through the ingress are matched against BASE_URL. Mirrors the
# legacy indico-operator config (USE_PROXY = True).
USE_PROXY = True

# --- Storage (s3 relation, optional) ---------------------------------------
STORAGE_BACKENDS = {"default": "fs:/srv/indico/archive"}
ATTACHMENT_STORAGE = "default"

if os.environ.get("S3_BUCKET"):
    _s3_parts = [
        f"bucket={os.environ['S3_BUCKET']}",
        f"access_key={os.environ.get('S3_ACCESS_KEY', '')}",
        f"secret_key={os.environ.get('S3_SECRET_KEY', '')}",
        # Proxy downloads through Indico so clients never need to reach the S3
        # endpoint directly (matches the legacy indico-operator behaviour and is
        # required for internal/non-public endpoints such as MinIO).
        "proxy=true",
    ]
    if os.environ.get("S3_ENDPOINT"):
        _s3_parts.append(f"host={os.environ['S3_ENDPOINT']}")
    # Addressing style: path-style is required for S3-compatible endpoints
    # addressed by IP/host (e.g. MinIO). paas-charm derives this from the
    # s3-integrator `s3-uri-style` config (S3_ADDRESSING_STYLE / S3_URI_STYLE).
    _addressing_style = os.environ.get("S3_ADDRESSING_STYLE") or os.environ.get(
        "S3_URI_STYLE"
    )
    if _addressing_style:
        _s3_parts.append(f"addressing_style={_addressing_style}")
    if os.environ.get("S3_REGION"):
        _s3_parts.append(f"region={os.environ['S3_REGION']}")
    STORAGE_BACKENDS["s3"] = "s3:" + ",".join(_s3_parts)
    ATTACHMENT_STORAGE = "s3"

# --- SMTP (smtp relation, optional) ----------------------------------------
if os.environ.get("SMTP_HOST"):
    SMTP_SERVER = (
        os.environ["SMTP_HOST"],
        int(os.environ.get("SMTP_PORT", "25")),
    )
    SMTP_USE_TLS = os.environ.get("SMTP_TRANSPORT_SECURITY", "none") != "none"
    SMTP_LOGIN = os.environ.get("SMTP_USER", "")
    SMTP_PASSWORD = os.environ.get("SMTP_PASSWORD", "")

SUPPORT_EMAIL = os.environ.get("FLASK_INDICO_SUPPORT_EMAIL", "support-tech@mydomain.local")
PUBLIC_SUPPORT_EMAIL = os.environ.get(
    "FLASK_INDICO_PUBLIC_SUPPORT_EMAIL", "support@mydomain.local"
)
NO_REPLY_EMAIL = os.environ.get("FLASK_INDICO_NO_REPLY_EMAIL", "noreply@mydomain.local")

# --- Plugins enabled at runtime (charm config: enabled-plugins) ------------
# Mirrors indico-operator behaviour: every installed plugin is enabled by
# default. Setting the `enabled-plugins` charm config (space-separated) to a
# non-empty value restricts activation to that explicit subset.
import importlib.metadata as _md

_enabled_cfg = os.environ.get("FLASK_ENABLED_PLUGINS", "").split()
if _enabled_cfg:
    PLUGINS = set(_enabled_cfg)
else:
    PLUGINS = {ep.name for ep in _md.entry_points(group="indico.plugins")}

# --- Authentication providers (SSO) ----------------------------------------
# Indico delegates authentication to flask-multipass providers. Two optional
# SSO backends are wired here, both ADDITIVE to the built-in local login:
#
#   * SAML  -- driven by the `saml` relation (paas-charm injects SAML_* from
#              the saml-integrator charm). Mirrors the legacy indico-operator
#              SAML provider (AUTH_PROVIDERS/IDENTITY_PROVIDERS).
#   * OIDC  -- driven by the `oauth` relation (paas-charm injects FLASK_OAUTH_*
#              from oauth-external-idp-integrator or any `oauth` provider): a
#              flask-multipass `authlib` provider.
#
# Local identities stay enabled (unless `local-identities=false`) so the
# bootstrap admin can always log in alongside SSO.
AUTH_PROVIDERS = {}
IDENTITY_PROVIDERS = {}

# SAML (saml relation, optional).
if os.environ.get("SAML_ENTITY_ID") and os.environ.get(
    "SAML_SINGLE_SIGN_ON_REDIRECT_URL"
):
    _saml_name = os.environ.get("FLASK_SAML_PROVIDER_NAME", "ubuntu")
    # python3-saml expects the bare base64 body, not PEM armor / newlines.
    _saml_cert = "".join(
        line
        for line in os.environ.get("SAML_SIGNING_CERTIFICATE", "").splitlines()
        if "CERTIFICATE" not in line
    ).strip()
    _saml_settings = {
        "strict": True,
        "sp": {"entityId": BASE_URL.rstrip("/")},
        "idp": {
            "entityId": os.environ["SAML_ENTITY_ID"],
            "x509cert": _saml_cert,
            "singleSignOnService": {
                "url": os.environ["SAML_SINGLE_SIGN_ON_REDIRECT_URL"],
                "binding": "urn:oasis:names:tc:SAML:2.0:bindings:HTTP-Redirect",
            },
        },
        "security": {
            "authnRequestsSigned": False,
            "wantAssertionsSigned": True,
            "wantMessagesSigned": False,
            "wantNameId": False,
        },
    }
    AUTH_PROVIDERS[_saml_name] = {
        "type": "saml",
        "title": os.environ.get("FLASK_SAML_PROVIDER_TITLE", "SSO (SAML)"),
        "saml_config": _saml_settings,
    }
    IDENTITY_PROVIDERS[_saml_name] = {
        # Use the saml_groups identity provider when the plugin is enabled so
        # IdP-provided groups map to Indico groups (mirrors indico-operator).
        "type": "saml_groups" if "saml_groups" in PLUGINS else "saml",
        "trusted_email": True,
        "mapping": {
            "user_name": "username",
            "first_name": "fullname",
            "last_name": "",
            "email": "email",
        },
        "identifier_field": "openid",
    }

# OIDC / OAuth2 (oauth relation, optional): a flask-multipass `authlib`
# provider. paas-charm injects FLASK_OAUTH_* from the `oauth` relation (the
# provider name is always "oauth"), e.g. when related to
# oauth-external-idp-integrator. All endpoints and credentials come from the
# relation; nothing is hard-coded here.
if os.environ.get("FLASK_OAUTH_API_BASE_URL") and os.environ.get(
    "FLASK_OAUTH_CLIENT_ID"
):
    import json as _json

    _oauth_name = "oauth"
    try:
        _oauth_client_kwargs = _json.loads(
            os.environ.get("FLASK_OAUTH_CLIENT_KWARGS", "")
        )
    except ValueError:
        _oauth_client_kwargs = {"scope": "openid email profile"}
    _authlib_args = {
        "client_id": os.environ["FLASK_OAUTH_CLIENT_ID"],
        "client_secret": os.environ.get("FLASK_OAUTH_CLIENT_SECRET", ""),
        "client_kwargs": _oauth_client_kwargs,
        # OIDC discovery off the relation's issuer URL supplies the issuer and
        # JWKS needed to validate the id_token.
        "server_metadata_url": os.environ["FLASK_OAUTH_API_BASE_URL"].rstrip("/")
        + "/.well-known/openid-configuration",
    }
    # Honour the explicit endpoints advertised by the IdP integrator when
    # present (they take precedence over the discovered metadata).
    for _env, _arg in (
        ("FLASK_OAUTH_AUTHORIZE_URL", "authorize_url"),
        ("FLASK_OAUTH_ACCESS_TOKEN_URL", "access_token_url"),
        ("FLASK_OAUTH_USER_URL", "userinfo_endpoint"),
        ("FLASK_OAUTH_JWKS_URL", "jwks_uri"),
    ):
        if os.environ.get(_env):
            _authlib_args[_arg] = os.environ[_env]
    AUTH_PROVIDERS[_oauth_name] = {
        "type": "authlib",
        "title": "Single sign-on",
        "authlib_args": _authlib_args,
    }
    IDENTITY_PROVIDERS[_oauth_name] = {
        "type": "authlib",
        "trusted_email": True,
        "mapping": {
            "user_name": "preferred_username",
            "first_name": "given_name",
            "last_name": "family_name",
            "email": "email",
        },
        "identifier_field": "email",
    }

# Keep local logins available unless explicitly disabled, so the bootstrap
# admin is never locked out when an SSO identity provider is configured.
LOCAL_IDENTITIES = os.environ.get("FLASK_LOCAL_IDENTITIES", "true").lower() not in (
    "false",
    "0",
    "no",
)

# --- Filesystem paths (writable for the `_daemon_` runtime user) -----------
TEMP_DIR = "/srv/indico/tmp"
CACHE_DIR = "/srv/indico/cache"
LOG_DIR = "/srv/indico/log"
CUSTOMIZATION_DIR = "/srv/indico/custom"
