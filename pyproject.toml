# Testing tools configuration
[tool.coverage.run]
branch = true

[tool.coverage.report]
show_missing = true
fail_under = 90

[tool.pytest.ini_options]
minversion = "6.0"
log_cli_level = "INFO"
markers = ["abort_on_fail"]
pythonpath = [
    "lib",
    "src",
]

# Linting tools configuration
[tool.ruff]
line-length = 99
lint.select = ["E", "W", "F", "C", "N", "D", "I001"]
lint.ignore = [
    "D105",
    "D107",
    "D203",
    "D204",
    "D213",
    "D215",
    "D400",
    "D404",
    "D406",
    "D407",
    "D408",
    "D409",
    "D413",
]
extend-exclude = ["__pycache__", "*.egg_info", "tests/zap"]
lint.per-file-ignores = {"tests/*" = ["D100","D101","D102","D103","D104","D205","D212","D400","D401","D415"]}

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.codespell]
skip = "build,lib,venv,icon.svg,.tox,.git,.mypy_cache,.ruff_cache,.coverage,./docs"

[tool.pyright]
include = ["src/**.py"]
